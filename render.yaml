services:
  - type: web
    name: mc-command-generator
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: CEREBRAS_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
